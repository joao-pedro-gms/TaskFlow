version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-taskflow}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-taskflow_secret}
      MONGO_INITDB_DATABASE: taskflow_nosql
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  activemq:
    image: apache/activemq-classic:5.18.3
    environment:
      ACTIVEMQ_ADMIN_LOGIN: ${ACTIVEMQ_USER:-admin}
      ACTIVEMQ_ADMIN_PASSWORD: ${ACTIVEMQ_PASSWORD:-admin_secret}
    ports:
      - "61616:61616"
      - "8161:8161"
    volumes:
      - activemq_data:/var/lib/activemq/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8161/admin/ -u ${ACTIVEMQ_USER:-admin}:${ACTIVEMQ_PASSWORD:-admin_secret} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskflow
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-taskflow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-taskflow_secret}
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER:-taskflow}:${MONGO_PASSWORD:-taskflow_secret}@mongodb:27017/taskflow_nosql?authSource=admin
      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_ACTIVEMQ_USER: ${ACTIVEMQ_USER:-admin}
      SPRING_ACTIVEMQ_PASSWORD: ${ACTIVEMQ_PASSWORD:-admin_secret}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_must_be_at_least_256_bits_long_secret_key}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      activemq:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  activemq_data:
